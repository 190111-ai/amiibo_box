name: Build AmiiboBox Firmware

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Arduino CLI
        run: |
          mkdir -p $HOME/bin
          curl -fsSL https://github.com/arduino/arduino-cli/releases/download/v1.1.1/arduino-cli_1.1.1_Linux_64bit.tar.gz -o arduino-cli.tar.gz
          tar -xzf arduino-cli.tar.gz -C $HOME/bin
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Configure Arduino CLI
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls \
            https://m5stack.oss-cn-shenzhen.aliyuncs.com/resource/arduino/package_m5stack_index.json

      - name: Install ESP32 / M5Stack platform
        run: |
          arduino-cli core update-index
          arduino-cli core install m5stack:esp32

      - name: Install libraries
        run: |
          arduino-cli lib install "M5StickCPlus2"
          arduino-cli lib install "M5Unified"
          arduino-cli lib install "M5GFX"
          arduino-cli lib install "ArduinoJson"
          arduino-cli lib install "Adafruit BusIO"
          curl -fsSL https://github.com/me-no-dev/AsyncTCP/archive/refs/heads/master.zip -o AsyncTCP.zip
          curl -fsSL https://github.com/me-no-dev/ESPAsyncWebServer/archive/refs/heads/master.zip -o ESPAsyncWebServer.zip
          curl -fsSL https://github.com/Mubbletm/Adafruit-PN532-emulation/archive/refs/heads/master.zip -o PN532.zip
          arduino-cli config set library.enable_unsafe_install true
          arduino-cli lib install --zip-path AsyncTCP.zip
          arduino-cli lib install --zip-path ESPAsyncWebServer.zip
          arduino-cli lib install --zip-path PN532.zip

      - name: Compile firmware
        run: |
          INO=$(find . -name "*.ino" | head -1)
          echo "Compilando: $INO"
          arduino-cli compile \
            --fqbn m5stack:esp32:m5stack_stickc_plus2 \
            --output-dir ./build \
            "$INO"

      - name: Merge into single flashable .bin
        run: |
          pip install esptool --break-system-packages
          DATADIR=$(arduino-cli config dump | grep "data:" | awk '{print $2}')
          BOOT_APP=$(find $DATADIR -name "boot_app0.bin" | head -1)
          echo "boot_app0: $BOOT_APP"
          BIN=$(find ./build -name "*.ino.bin" | head -1)
          BOOT=$(find ./build -name "*.bootloader.bin" | head -1)
          PART=$(find ./build -name "*.partitions.bin" | head -1)
          echo "BIN: $BIN BOOT: $BOOT PART: $PART"
          esptool --chip esp32 merge-bin \
            -o ./build/amiibobox_flash.bin \
            --flash-mode dio \
            --flash-freq 80m \
            --flash-size 8MB \
            0x1000  $BOOT \
            0x8000  $PART \
            0xe000  $BOOT_APP \
            0x10000 $BIN

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: amiibobox-firmware
          path: ./build/amiibobox_flash.bin
          retention-days: 30
